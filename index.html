<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout Log</title>
    <meta name="theme-color" content="#c55b2d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Workout Log" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css?v=7" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">Workout Log</p>
        <h1>トレーニングを始める</h1>
        <p class="hero-copy">まずは START。終わったら Finish。過去の記録は下の選択からすぐ見返せます。</p>
        <a class="hero-link" href="./exercise.html">種目ごとの成長を見る</a>
      </header>

      <main class="layout">
        <section class="panel start-panel">
          <p class="section-label">Start</p>
          <h2>今日のトレーニング</h2>
          <p id="today-label" class="today-label"></p>
          <button id="start-button" class="primary-button" type="button">START</button>
          <button id="finish-button" class="secondary-button" type="button" disabled>Finish</button>

          <div class="session-card">
            <div>
              <span>開始時刻</span>
              <strong id="start-time">--:--</strong>
            </div>
            <div>
              <span>終了時刻</span>
              <strong id="finish-time">--:--</strong>
            </div>
            <div>
              <span>経過時間</span>
              <strong id="duration-time">--</strong>
            </div>
          </div>

          <label class="field hidden" id="bodyweight-field">
            <span>体重(kg)</span>
            <input id="bodyweight-input" type="number" min="0" step="0.1" placeholder="70.5" />
          </label>

          <div id="exercise-panel" class="exercise-panel hidden">
            <div class="exercise-header">
              <span class="section-label">Exercises</span>
              <button id="add-exercise" class="mini-button" type="button">種目を追加</button>
            </div>
            <div id="preset-list" class="preset-list">
              <button class="preset-button" type="button" data-name="ベンチプレス">ベンチプレス</button>
              <button class="preset-button" type="button" data-name="スクワット">スクワット</button>
              <button class="preset-button" type="button" data-name="デッドリフト">デッドリフト</button>
              <button class="preset-button" type="button" data-name="ショルダープレス">ショルダープレス</button>
              <button class="preset-button" type="button" data-name="懸垂">懸垂</button>
            </div>
            <div id="exercise-list" class="exercise-list"></div>
          </div>
        </section>

        <section class="panel history-panel">
          <p class="section-label">History</p>
          <h2>過去トレーニング選択</h2>
          <label class="field">
            <span>記録を選ぶ</span>
            <select id="history-select"></select>
          </label>
          <div id="history-empty" class="empty-state">まだ過去のトレーニング記録がありません。</div>
          <div id="history-detail" class="history-detail hidden"></div>
        </section>
      </main>
    </div>

    <template id="exercise-template">
      <div class="exercise-item">
        <div class="exercise-item-header">
          <input class="exercise-name" list="exercise-name-list" type="text" placeholder="種目名 例: ベンチプレス" />
          <button class="remove-exercise" type="button">削除</button>
        </div>
        <div class="set-row simple-set-row">
        <input class="set-weight" type="number" min="0" step="0.5" placeholder="kg" />
        <input class="set-reps" type="number" min="1" step="1" placeholder="回数" />
        <input class="set-count" type="number" min="1" step="1" placeholder="セット数" />
      </div>
    </template>

    <datalist id="exercise-name-list">
      <option value="ベンチプレス"></option>
      <option value="スクワット"></option>
      <option value="デッドリフト"></option>
      <option value="ショルダープレス"></option>
      <option value="懸垂"></option>
      <option value="ラットプルダウン"></option>
      <option value="ダンベルプレス"></option>
    </datalist>

    <script src="./app.js?v=7"></script>
  </body>
</html>
