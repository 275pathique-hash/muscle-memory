<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout Log</title>
    <meta name="theme-color" content="#c55b2d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Workout Log" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <p class="eyebrow">Workout Log</p>
        <h1>トレーニングを始める</h1>
        <p class="hero-copy">まずは START。終わったら Finish。過去の記録は下の選択からすぐ見返せます。</p>
      </header>

      <main class="layout">
        <section class="panel start-panel">
          <p class="section-label">Start</p>
          <h2>今日のトレーニング</h2>
          <p id="today-label" class="today-label"></p>
          <button id="start-button" class="primary-button" type="button">START</button>
          <button id="finish-button" class="secondary-button" type="button" disabled>Finish</button>

          <div class="session-card">
            <div>
              <span>開始時刻</span>
              <strong id="start-time">--:--</strong>
            </div>
            <div>
              <span>終了時刻</span>
              <strong id="finish-time">--:--</strong>
            </div>
            <div>
              <span>経過時間</span>
              <strong id="duration-time">--</strong>
            </div>
          </div>

          <label class="field">
            <span>メモ</span>
            <textarea id="session-note" rows="3" placeholder="今日の部位や気づき"></textarea>
          </label>
        </section>

        <section class="panel history-panel">
          <p class="section-label">History</p>
          <h2>過去トレーニング選択</h2>
          <label class="field">
            <span>記録を選ぶ</span>
            <select id="history-select"></select>
          </label>
          <div id="history-empty" class="empty-state">まだ過去のトレーニング記録がありません。</div>
          <div id="history-detail" class="history-detail hidden"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
